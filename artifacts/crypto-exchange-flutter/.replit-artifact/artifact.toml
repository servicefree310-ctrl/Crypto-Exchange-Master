kind = "web"
previewPath = "/flutter/"
title = "ZEBVIX Flutter"
version = "1.0.0"
id = "artifacts/crypto-exchange-flutter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/flutter/" ]
localPort = 8082

[services.development]
run = "bash /home/runner/workspace/artifacts/crypto-exchange-flutter/scripts/dev.sh"

[services.production]
build = [ "bash", "artifacts/crypto-exchange-flutter/scripts/build.sh" ]
publicDir = "artifacts/crypto-exchange-flutter/build/web"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8082"
BASE_PATH = "/flutter/"
