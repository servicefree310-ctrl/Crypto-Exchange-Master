kind = "web"
previewPath = "/go-service/"
title = "CryptoX Go Service"
version = "1.0.0"
id = "artifacts/go-service"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/go-service/", "/go-service/healthz", "/go-service/ws", "/go-service/api" ]
localPort = 23004

[services.development]
run = "./bin/cryptox-go"

[services.production]
build = [ "go", "build", "-o", "bin/cryptox-go", "." ]
run = [ "./bin/cryptox-go" ]

[services.env]
PORT = "23004"
BASE_PATH = "/go-service/"
BIND_ADDR = "0.0.0.0"
