openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: p2p
    description: P2P trading — offers, orders, payment methods, chat, disputes
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── P2P: payment methods ────────────────────────────────────────────
  /p2p/payment-methods:
    get:
      operationId: listP2pPaymentMethods
      tags: [p2p]
      summary: List the authenticated user's saved P2P payment methods
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/P2pPaymentMethod" }
    post:
      operationId: createP2pPaymentMethod
      tags: [p2p]
      summary: Add a payment method (UPI / IMPS / bank / wallet)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/P2pPaymentMethodInput" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pPaymentMethod" }

  /p2p/payment-methods/{id}:
    delete:
      operationId: deleteP2pPaymentMethod
      tags: [p2p]
      summary: Soft-delete (deactivate) a payment method
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  # ─── P2P: offers (ads) ───────────────────────────────────────────────
  /p2p/offers:
    get:
      operationId: listP2pOffers
      tags: [p2p]
      summary: Browse the public offer book
      parameters:
        - in: query
          name: side
          required: false
          schema: { type: string, enum: [buy, sell] }
          description: "buy = merchant wants to buy crypto from you; sell = merchant sells crypto to you"
        - in: query
          name: coinId
          required: false
          schema: { type: integer, minimum: 1 }
        - in: query
          name: fiat
          required: false
          schema: { type: string, default: INR }
        - in: query
          name: paymentMethod
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/P2pOffer" }
    post:
      operationId: createP2pOffer
      tags: [p2p]
      summary: Post a new merchant offer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/P2pOfferInput" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pOffer" }

  /p2p/offers/mine:
    get:
      operationId: listMyP2pOffers
      tags: [p2p]
      summary: List offers owned by the authenticated user (any status)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/P2pOffer" }

  /p2p/offers/{id}:
    patch:
      operationId: updateP2pOffer
      tags: [p2p]
      summary: Update a merchant's own offer (price / qty / payment methods / status)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/P2pOfferPatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pOffer" }
    delete:
      operationId: deleteP2pOffer
      tags: [p2p]
      summary: Soft-delete a merchant's own offer (status → closed)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Closed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  # ─── P2P: orders ─────────────────────────────────────────────────────
  /p2p/orders:
    get:
      operationId: listP2pOrders
      tags: [p2p]
      summary: List all orders the authenticated user is party to (buyer or seller)
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [pending, paid, released, cancelled, disputed, expired] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/P2pOrder" }
    post:
      operationId: openP2pOrder
      tags: [p2p]
      summary: Open a new order against an existing offer (locks seller's escrow)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/P2pOrderInput" }
      responses:
        "200":
          description: Opened
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pOrder" }

  /p2p/orders/{id}:
    get:
      operationId: getP2pOrder
      tags: [p2p]
      summary: Get a single order (must be a party or admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pOrder" }

  /p2p/orders/{id}/mark-paid:
    post:
      operationId: markP2pOrderPaid
      tags: [p2p]
      summary: Buyer marks the fiat as transferred (optional UTR / reference)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/P2pMarkPaidInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pOrder" }

  /p2p/orders/{id}/release:
    post:
      operationId: releaseP2pOrder
      tags: [p2p]
      summary: Seller releases escrow → crypto credited to buyer
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Released
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pOrder" }

  /p2p/orders/{id}/cancel:
    post:
      operationId: cancelP2pOrder
      tags: [p2p]
      summary: Cancel a pending order (refunds seller's escrow)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pOrder" }

  /p2p/orders/{id}/dispute:
    post:
      operationId: openP2pDispute
      tags: [p2p]
      summary: Open a dispute on a pending or paid order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/P2pDisputeInput" }
      responses:
        "200":
          description: Disputed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pOrder" }

  /p2p/orders/{id}/messages:
    get:
      operationId: listP2pMessages
      tags: [p2p]
      summary: List chat messages on an order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/P2pMessage" }
    post:
      operationId: postP2pMessage
      tags: [p2p]
      summary: Post a chat message to an order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, minimum: 1 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/P2pMessageInput" }
      responses:
        "200":
          description: Posted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/P2pMessage" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    OkResponse:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]

    Coin:
      type: object
      properties:
        id: { type: integer }
        symbol: { type: string }
        name: { type: string }
      required: [id, symbol, name]

    Merchant:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        handle: { type: string }
        kycLevel: { type: integer }
        vipTier: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, name, handle, kycLevel, vipTier, createdAt]

    P2pPaymentMethod:
      type: object
      properties:
        id: { type: integer }
        method: { type: string, enum: [upi, imps, neft, bank, paytm, phonepe, gpay] }
        label: { type: string }
        account: { type: string }
        ifsc: { type: string, nullable: true }
        holderName: { type: string, nullable: true }
        active: { type: boolean }
      required: [id, method, label, account, active]

    P2pPaymentMethodInput:
      type: object
      required: [method, label, account]
      properties:
        method: { type: string, enum: [upi, imps, neft, bank, paytm, phonepe, gpay] }
        label: { type: string, minLength: 1, maxLength: 60 }
        account: { type: string, minLength: 1, maxLength: 120 }
        ifsc: { type: string, maxLength: 20 }
        holderName: { type: string, maxLength: 80 }

    P2pOffer:
      type: object
      properties:
        id: { type: integer }
        uid: { type: string }
        userId: { type: integer }
        side: { type: string, enum: [buy, sell] }
        fiat: { type: string }
        price: { type: number }
        totalQty: { type: number }
        availableQty: { type: number }
        minFiat: { type: number }
        maxFiat: { type: number }
        paymentMethods:
          type: array
          items: { type: string }
        payWindowMins: { type: integer }
        terms: { type: string, nullable: true }
        status: { type: string, enum: [online, offline, closed, suspended] }
        minKycLevel: { type: integer }
        minTrades: { type: integer }
        coin:
          oneOf:
            - $ref: "#/components/schemas/Coin"
            - type: "null"
        merchant: { $ref: "#/components/schemas/Merchant" }
        createdAt: { type: string, format: date-time }
      required: [id, uid, userId, side, fiat, price, totalQty, availableQty, minFiat, maxFiat, paymentMethods, payWindowMins, status, minKycLevel, minTrades, merchant, createdAt]

    P2pOfferInput:
      type: object
      required: [side, coinId, price, totalQty, minFiat, maxFiat, paymentMethods]
      properties:
        side: { type: string, enum: [buy, sell] }
        coinId: { type: integer, minimum: 1 }
        fiat: { type: string, default: INR }
        price: { type: number, exclusiveMinimum: 0 }
        totalQty: { type: number, exclusiveMinimum: 0 }
        minFiat: { type: number, exclusiveMinimum: 0 }
        maxFiat: { type: number, exclusiveMinimum: 0 }
        paymentMethods:
          type: array
          minItems: 1
          items: { type: string, enum: [upi, imps, neft, bank, paytm, phonepe, gpay] }
        payWindowMins: { type: integer, minimum: 5, maximum: 240, default: 15 }
        terms: { type: string, maxLength: 2000 }
        minKycLevel: { type: integer, minimum: 0, maximum: 3, default: 1 }
        minTrades: { type: integer, minimum: 0, default: 0 }

    P2pOfferPatch:
      type: object
      properties:
        price: { type: number, exclusiveMinimum: 0 }
        totalQty: { type: number, exclusiveMinimum: 0 }
        minFiat: { type: number, exclusiveMinimum: 0 }
        maxFiat: { type: number, exclusiveMinimum: 0 }
        paymentMethods:
          type: array
          items: { type: string, enum: [upi, imps, neft, bank, paytm, phonepe, gpay] }
        payWindowMins: { type: integer, minimum: 5, maximum: 240 }
        terms: { type: string, maxLength: 2000 }
        status: { type: string, enum: [online, offline, closed] }
        minKycLevel: { type: integer, minimum: 0, maximum: 3 }
        minTrades: { type: integer, minimum: 0 }

    P2pOrder:
      type: object
      properties:
        id: { type: integer }
        uid: { type: string }
        offerId: { type: integer }
        buyerId: { type: integer }
        sellerId: { type: integer }
        fiat: { type: string }
        price: { type: number }
        qty: { type: number }
        fiatAmount: { type: number }
        paymentMethod: { type: string }
        paymentAccount: { type: string }
        paymentLabel: { type: string }
        paymentIfsc: { type: string, nullable: true }
        paymentHolderName: { type: string, nullable: true }
        paymentUtr: { type: string, nullable: true }
        status: { type: string, enum: [pending, paid, released, cancelled, disputed, expired] }
        paidAt: { type: string, format: date-time, nullable: true }
        releasedAt: { type: string, format: date-time, nullable: true }
        cancelledAt: { type: string, format: date-time, nullable: true }
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        disputeReason: { type: string, nullable: true }
        disputeOpenedBy: { type: integer, nullable: true }
        role: { type: string, enum: [buyer, seller] }
        coin:
          oneOf:
            - $ref: "#/components/schemas/Coin"
            - type: "null"
        buyer: { $ref: "#/components/schemas/Merchant" }
        seller: { $ref: "#/components/schemas/Merchant" }
      required: [id, uid, offerId, buyerId, sellerId, fiat, price, qty, fiatAmount, paymentMethod, paymentAccount, paymentLabel, status, expiresAt, createdAt, role, buyer, seller]

    P2pOrderInput:
      type: object
      required: [offerId, qty, paymentMethodId]
      properties:
        offerId: { type: integer, minimum: 1 }
        qty: { type: number, exclusiveMinimum: 0 }
        paymentMethodId: { type: integer, minimum: 1 }

    P2pMessage:
      type: object
      properties:
        id: { type: integer }
        orderId: { type: integer }
        senderId: { type: integer }
        senderRole: { type: string, enum: [buyer, seller, admin, system] }
        body: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, orderId, senderId, senderRole, body, createdAt]

    P2pMarkPaidInput:
      type: object
      properties:
        utr: { type: string, maxLength: 64 }

    P2pDisputeInput:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 8, maxLength: 1000 }

    P2pMessageInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 2000 }
